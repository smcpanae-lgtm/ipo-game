<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE IPO PATH: 栄光への決断</title>
<style>
/* ════════════════════════════════════════════
   リセット & 変数
════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #1b4068;   /* ① 明るい海青（near-black → medium navy） */
  --bg-sb:    #10284a;   /* ① サイドバー：深い海軍色 */
  --bg-panel: #16335a;   /* ① パネル背景 */
  --gold:     #ffd700;
  --gold-dk:  #b8860b;
  --gold-br:  #ffe866;
  --cyan:     #00e5ff;
  --green:    #00dd88;
  --red:      #ff4455;
  --yellow:   #ffcc00;
  --purple:   #cc44ff;
  --white:    #dde8ff;
  --dim:      #7aaccc;   /* ① 水色がかったグレー */
  --text:     #cce8ff;   /* ① 明るい空色テキスト */
  --radius:   6px;
}

html, body {
  height: 100%;
  color: var(--text);
  font-family: 'Meiryo UI', 'Noto Sans JP', 'Yu Gothic UI', sans-serif;
  font-size: 14px;
  overflow: hidden;
  background: linear-gradient(180deg, #0a1d38 0%, #122b52 45%, #1b4068 100%);
  background-attachment: fixed;
}
/* タイトル画面表示中は全背景を非表示（fixed overlayが全面を覆う） */
body:has(.title-screen),
html:has(.title-screen) {
  background: #000 !important;
}
#story:has(.title-screen) {
  background: transparent !important;
}

/* ════════════════════════════════════════════
   アプリレイアウト（3段グリッド）
════════════════════════════════════════════ */
#app {
  display: grid;
  grid-template-rows: 64px 1fr 60px auto;
  height: 100vh;
}

/* ─── ヘッダー ─── */
#hdr {
  background: linear-gradient(90deg, #0a2a5a 0%, #1a5aaa 40%, #1a5aaa 60%, #0a2a5a 100%);
  border-bottom: 2px solid #3399dd;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  position: relative;
  padding: 0 56px 0 140px;   /* 右:保存ボタン / 左:ロゴ分のスペース確保 */
}
#hdr::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg, transparent, transparent 40px,
    rgba(255,215,0,.03) 40px, rgba(255,215,0,.03) 41px
  );
}
#hdr-title {
  font-size: 17px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 5px;
  text-shadow: 0 0 24px rgba(100,200,255,.8), 0 0 60px rgba(100,200,255,.3);
  position: relative;
}
#hdr-deco { color: #88ccee; font-size: 14px; }
#hdr-save-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,215,0,.15);
  border: 1px solid rgba(255,215,0,.4);
  border-radius: 6px;
  color: var(--gold);
  font-size: 11px;
  line-height: 1.2;
  padding: 4px 8px;
  text-align: center;
  cursor: pointer;
  transition: background .15s;
  z-index: 10;
  display: none;  /* ゲーム中のみ表示 */
}
#hdr-save-btn:hover { background: rgba(255,215,0,.3); }

/* ヘッダーロゴ（左側絶対配置） */
#hdr-logo-link {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  align-items: center;
  opacity: 0.90;
  transition: opacity .2s, filter .2s;
  filter: drop-shadow(0 0 5px rgba(255,215,0,.35));
  z-index: 10;
}
#hdr-logo-link:hover {
  opacity: 1;
  filter: drop-shadow(0 0 12px rgba(255,215,0,.7));
}
#hdr-logo-img {
  height: 58px;
  max-width: 130px;
  object-fit: contain;
  border-radius: 4px;
}

/* ─── メインエリア（左サイドバー + ストーリー + 右サイドバー）─── */
#main {
  display: grid;
  grid-template-columns: 230px 1fr 200px;
  overflow: hidden;
}

/* ════════════════════════════════════════════
   サイドバー
════════════════════════════════════════════ */
#sidebar {
  background: var(--bg-sb);
  border-right: 1px solid #1a1a40;
  overflow-y: auto;
  padding: 12px 10px;
  scrollbar-width: thin;
  scrollbar-color: #2a2a50 var(--bg-sb);
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: var(--bg-sb); }
#sidebar::-webkit-scrollbar-thumb { background: #2a5888; border-radius: 4px; }

/* ─── 右サイドバー（上場準備チェック）─── */
#right-sidebar {
  background: var(--bg-sb);
  border-left: 1px solid #1a1a40;
  overflow-y: auto;
  padding: 10px 8px;
  scrollbar-width: thin;
  scrollbar-color: #2a2a50 var(--bg-sb);
}
#right-sidebar::-webkit-scrollbar { width: 4px; }
#right-sidebar::-webkit-scrollbar-track { background: var(--bg-sb); }
#right-sidebar::-webkit-scrollbar-thumb { background: #2a5888; border-radius: 4px; }
.rsb-title {
  font-size: 10px; font-weight: 700; color: var(--gold-dk);
  letter-spacing: 1px; text-align: center;
  border-bottom: 1px solid #2a5888; padding-bottom: 4px; margin-bottom: 5px;
}

/* サイドバー要素 */
.sb-title    { color: var(--gold); font-weight: 700; font-size: 15px; text-align:center; margin-bottom:3px; }
.sb-title-ja { color: var(--dim);  font-size: 12px;  text-align:center; margin-bottom:12px; }
.sb-waiting  { color: var(--dim);  font-size: 12px;  text-align:center; font-style:italic; }
.sb-period   { font-size: 13px; font-weight: 700; margin-bottom: 1px; }
.sb-co       { font-size: 12px; color: #88bbdd; font-weight: 600; margin-bottom: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-biz      { font-size: 10px; color: #4477aa; margin-bottom: 4px; }
/* Q進捗バー行 */
.sb-q-row    { display: flex; align-items: center; gap: 6px; margin: 2px 0 6px; }
.sb-q-dots   { font-size: 13px; letter-spacing: 2px; font-weight: 700; flex-shrink: 0; }
.sb-q-ipo    { font-size: 10px; color: #ffd700; }
.sb-sec      { font-size: 10px; color: var(--gold-dk); border-top: 1px solid #2a5888; margin: 7px 0 4px; padding-top: 4px; letter-spacing: 1px; }
/* 折り畳みセクション（財務・スコア）：見出しクリックで開閉 */
.sb-sec.sb-toggle { cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
.sb-sec.sb-toggle:hover { color: var(--gold); }
.sb-caret { font-size: 9px; transition: transform .18s ease; opacity: .8; }
.sb-collapse.collapsed .sb-caret { transform: rotate(-90deg); }
.sb-collapse.collapsed .sb-collapse-body { display: none; }
.sbr         { display: flex; justify-content: space-between; font-size: 12px; margin: 2px 0; gap: 4px; }
.sbr span:first-child { color: var(--dim); flex-shrink: 0; }
.sbr span:last-child  { font-family: 'Courier New', monospace; text-align: right; }
.srow        { display: flex; align-items: center; gap: 5px; margin: 2px 0; }
.srow-lbl    { flex: 0 0 72px; font-size: 10px; color: var(--dim); }
.srow-val    { flex: 0 0 22px; font-size: 11px; font-family: monospace; text-align: right; }
.mini-bar    { flex: 1; height: 5px; background: #1a4070; border-radius: 3px; overflow: hidden; }
.mini-fill   { height: 100%; border-radius: 3px; transition: width .4s ease; }
.ckrow       { font-size: 11px; margin: 1px 0; line-height: 1.3; }
.ck-pass     { color: var(--green); margin-right: 4px; }
.ck-fail     { color: var(--red);   margin-right: 4px; }
.sb-phase    { font-size: 10px; font-weight: 700; margin: 6px 0 2px; padding: 2px 4px; border-radius: 3px; letter-spacing: .5px; }
.sb-phase-n3 { color: #4499ff; background: rgba(68,153,255,.12); }
.sb-phase-n2 { color: #00e5ff; background: rgba(0,229,255,.12); }
.sb-phase-n1 { color: #ffdd00; background: rgba(255,221,0,.12); }
.sb-phase-n0 { color: #ff4444; background: rgba(255,68,68,.12); }
.advisor     { font-size: 13px; margin-top: 3px; }

/* ════════════════════════════════════════════
   ストーリーエリア
════════════════════════════════════════════ */
#story {
  overflow-y: auto;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scrollbar-width: thin;
  scrollbar-color: #2a5888 var(--bg);
  /* シーン背景（#scene-bg）を透かすため半透明 */
  background:
    radial-gradient(ellipse at 0% 0%,   rgba(100,200,255,.08) 0%, transparent 55%),
    radial-gradient(ellipse at 100% 100%, rgba(160,100,255,.05) 0%, transparent 55%),
    rgba(27,64,104,.42);
}

/* ════════════════════════════════════════════
   🏛 シーン背景システム（取締役会・株主総会・社長室）
════════════════════════════════════════════ */
#scene-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: var(--bg);
}
.scene-layer {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center 30%;
  opacity: 0;
  transition: opacity 1.4s ease;
}
.scene-layer.scene-on { opacity: 1; }
/* 暗幕：テキストの可読性を確保しつつ背景の雰囲気を残す */
#scene-dim {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(6,16,34,.82) 0%, rgba(6,16,34,.66) 35%, rgba(6,16,34,.80) 100%);
}
#app { position: relative; z-index: 1; }
/* タイトル画面中はシーン背景を消す */
body:has(.title-screen) #scene-bg { display: none; }

/* シーンフラッシュ：場面転換の瞬間だけ背景画像を最前面にフル表示
   （バナーと同時に現れ、バナーが消えると同時に暗幕付き背景へ戻る）*/
#scene-flash {
  position: fixed;
  inset: 0;
  z-index: 240;            /* バナー(250)のすぐ下・UI(#app=1)より上 */
  pointer-events: none;
  opacity: 0;
  background-size: cover;
  background-position: center 30%;
}
#scene-flash.flash-show { animation: sceneFlash 2.3s ease both; }
@keyframes sceneFlash {
  0%   { opacity: 0; }
  10%  { opacity: 1; }
  78%  { opacity: 1; }
  100% { opacity: 0; }
}

/* シーン転換バナー（アイキャッチ）*/
#scene-banner {
  position: fixed;
  top: 42%;
  left: 0;
  right: 0;
  z-index: 250;
  pointer-events: none;
  text-align: center;
  opacity: 0;
}
#scene-banner.banner-show {
  animation: sceneBanner 2.2s ease forwards;
}
#scene-banner .banner-inner {
  display: inline-block;
  padding: 12px 60px;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 6px;
  color: #fff;
  text-shadow: 0 0 18px rgba(0,229,255,.8), 0 2px 6px rgba(0,0,0,.8);
  background: linear-gradient(90deg, transparent 0%, rgba(8,30,66,.92) 18%, rgba(8,30,66,.92) 82%, transparent 100%);
  border-top: 1px solid rgba(255,215,0,.55);
  border-bottom: 1px solid rgba(255,215,0,.55);
}
@keyframes sceneBanner {
  0%   { opacity: 0; transform: scale(.92); }
  12%  { opacity: 1; transform: scale(1); }
  80%  { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.02); }
}

/* ════════════════════════════════════════════
   🗺 ワールドマップ（すごろく盤面・全画面）
════════════════════════════════════════════ */
.map-move { display: none; }   /* サーバーからの移動指示タグは非表示 */
#worldmap-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  background: #06101f;
}
#worldmap-overlay.wm-show { display: flex; animation: wmFade .45s ease; }
@keyframes wmFade { from { opacity: 0; } to { opacity: 1; } }
#wm-frame {
  position: relative;
  aspect-ratio: 1672 / 941;
  width: 100vw;
  max-width: calc(100vh * 1.7768);
  max-height: 100vh;
  background: url('/static/bg_worldmap.jpg') center / cover no-repeat;
}
/* コマ（社長チビキャラ）*/
#wm-piece {
  position: absolute;
  width: 8.5%;
  transform: translate(-50%, -92%);
  filter: drop-shadow(0 6px 8px rgba(0,0,0,.45));
  will-change: left, top;
}
/* 🏁 ライバルコマ */
#wm-rival-wrap {
  position: absolute;
  width: 7%;
  transform: translate(-50%, -92%);
  pointer-events: none;
  will-change: left, top;
  display: none;
}
#wm-rival {
  width: 100%;
  display: block;
  filter: drop-shadow(0 5px 7px rgba(0,0,0,.45));
}
#wm-rival-tag {
  margin-top: -2px;
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #fff;
  background: rgba(150,30,50,.88);
  border: 1px solid rgba(255,120,140,.5);
  border-radius: 6px;
  padding: 1px 4px;
  white-space: nowrap;
}
/* 現在地リング（足元の光輪）*/
#wm-ring {
  position: absolute;
  width: 5.5%;
  aspect-ratio: 2.2 / 1;
  transform: translate(-50%, -50%);
  border: 3px solid rgba(0,229,255,.85);
  border-radius: 50%;
  box-shadow: 0 0 18px rgba(0,229,255,.6);
  animation: wmRing 1.4s ease-in-out infinite;
  pointer-events: none;
}
@keyframes wmRing {
  0%, 100% { opacity: .9; }
  50%      { opacity: .3; }
}
/* ラベル帯（上部中央）*/
#wm-label {
  position: absolute;
  top: 5%;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  padding: 10px 48px;
  font-size: 21px;
  font-weight: 700;
  letter-spacing: 4px;
  color: #fff;
  text-shadow: 0 0 16px rgba(0,229,255,.8), 0 2px 6px rgba(0,0,0,.9);
  background: linear-gradient(90deg, transparent 0%, rgba(8,30,66,.88) 15%, rgba(8,30,66,.88) 85%, transparent 100%);
  border-top: 1px solid rgba(255,215,0,.55);
  border-bottom: 1px solid rgba(255,215,0,.55);
}
/* 転落時：赤いビネット＋画面シェイク */
#worldmap-overlay.wm-fall #wm-frame { animation: wmShake .5s ease-in-out 2; }
#worldmap-overlay.wm-fall::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(200,0,0,.38) 100%);
}
@keyframes wmShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-10px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(4px); }
}
/* ゴール時：コマの周囲に金色の光 */
#wm-piece.wm-glory {
  filter: drop-shadow(0 0 24px rgba(255,215,0,.95)) drop-shadow(0 6px 8px rgba(0,0,0,.45));
}

/* ════════════════════════════════════════════
   🔨 意思決定ガベル演出（裁判官が小槌を2回打つ）
════════════════════════════════════════════ */
#gavel-overlay {
  position: fixed;
  inset: 0;
  z-index: 8000;
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  background: rgba(2,8,20,.50);
}
#gavel-overlay.gavel-show { display: flex; animation: gavelFade 2.0s ease both; }
@keyframes gavelFade {
  0%   { opacity: 0; }
  8%   { opacity: 1; }
  88%  { opacity: 1; }
  100% { opacity: 0; }
}
.gavel-stage { position: relative; width: 340px; height: 220px; }
/* 裁判官 */
.gavel-judge {
  position: absolute; left: 6px; bottom: 38px;
  font-size: 84px; line-height: 1;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,.6));
}
/* 小槌（トンカチ）：2回振り下ろす */
.gavel-hammer {
  position: absolute; right: 64px; bottom: 84px;
  font-size: 72px; line-height: 1;
  transform-origin: 85% 85%;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,.6));
  animation: gavelSwing 2.0s ease-in both;
}
@keyframes gavelSwing {
  0%, 16% { transform: rotate(-50deg); }
  23%     { transform: rotate(16deg); }   /* 1打目 ≈460ms */
  30%     { transform: rotate(-46deg); }
  41%     { transform: rotate(-46deg); }
  48%     { transform: rotate(16deg); }   /* 2打目 ≈960ms */
  56%     { transform: rotate(-50deg); }
  100%    { transform: rotate(-50deg); }
}
/* 打撃台 */
.gavel-base {
  position: absolute; right: 36px; bottom: 56px;
  width: 110px; height: 14px; border-radius: 5px;
  background: linear-gradient(180deg, #8a5a2b, #5d3a18);
  box-shadow: 0 4px 10px rgba(0,0,0,.55);
}
/* 打撃の閃光 */
.gavel-impact {
  position: absolute; right: 64px; bottom: 64px;
  font-size: 40px; color: #ffe866;
  text-shadow: 0 0 18px rgba(255,215,0,.9);
  opacity: 0;
  animation: gavelImpact 2.0s linear both;
}
@keyframes gavelImpact {
  0%, 22%  { opacity: 0; transform: scale(.4); }
  24%      { opacity: 1; transform: scale(1.25); }  /* 1打目 */
  29%      { opacity: 0; transform: scale(.5); }
  47%      { opacity: 0; transform: scale(.4); }
  49%      { opacity: 1; transform: scale(1.45); }  /* 2打目 */
  56%      { opacity: 0; transform: scale(.6); }
  100%     { opacity: 0; }
}
/* 「決 定」スタンプ */
.gavel-decided {
  position: absolute; left: 50%; top: 46%;
  transform: translate(-50%, -50%) rotate(-7deg);
  font-size: 38px; font-weight: 700; letter-spacing: 10px;
  color: #ffd700;
  border: 4px solid #ffd700; border-radius: 8px;
  padding: 6px 22px;
  background: rgba(8,30,66,.85);
  text-shadow: 0 0 22px rgba(255,215,0,.7);
  box-shadow: 0 0 30px rgba(255,215,0,.35);
  opacity: 0;
  animation: gavelStamp 2.0s ease both;
}
@keyframes gavelStamp {
  0%, 55% { opacity: 0; transform: translate(-50%,-50%) rotate(-7deg) scale(2.4); }
  62%     { opacity: 1; transform: translate(-50%,-50%) rotate(-7deg) scale(1); }
  90%     { opacity: 1; }
  100%    { opacity: 0; }
}
#story::-webkit-scrollbar { width: 5px; }
#story::-webkit-scrollbar-track { background: transparent; }
#story::-webkit-scrollbar-thumb { background: #2a2a50; border-radius: 4px; }

/* アニメーション */
.story-item { animation: fadeSlide .25s ease; }
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 📖 決算レポート：ページめくり演出 */
#story { perspective: 1500px; }
.story-item:has(.quarter-closing-report) {
  position: relative;
  transform-origin: left center;
  backface-visibility: hidden;
  animation: pageFlip 1.05s cubic-bezier(.25,.75,.3,1) both;
}
@keyframes pageFlip {
  0%   { transform: rotateY(-105deg); opacity: 0; }
  25%  { opacity: 1; }
  70%  { transform: rotateY(8deg); }    /* めくり切った反動 */
  100% { transform: rotateY(0deg); opacity: 1; }
}
/* めくり中に紙面を走る光（ページの照り返し）*/
.story-item:has(.quarter-closing-report)::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: inherit;
  background: linear-gradient(100deg,
    rgba(255,255,255,.30) 0%, rgba(255,255,255,.10) 18%, transparent 40%);
  animation: pageShine 1.05s ease both;
}
@keyframes pageShine {
  0%   { opacity: 1; }
  70%  { opacity: .5; }
  100% { opacity: 0; }
}
@keyframes ipoZoomIn {
  from { opacity: 0; transform: scale(.6) translateY(30px); }
  to   { opacity: 1; transform: scale(1)  translateY(0); }
}

/* ════════════════════════════════════════════
   タイトル画面（フルスクリーンオーバーレイ）
════════════════════════════════════════════ */

/* 全画面を画像で覆う固定レイヤー */
.title-screen {
  position: fixed;
  inset: 0;
  z-index: 200;
  background-image: url('/title-img.png');
  background-size: cover;
  background-position: center top;
  background-color: #3a78b8;   /* 画像読込失敗時の空色フォールバック */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;   /* テキスト・ボタンは下寄せ */
  padding-bottom: 5vh;
  overflow-y: auto;
  animation: titleRise .9s cubic-bezier(.2,.9,.3,1);
}

/* グラデーションオーバーレイは使用しない（画像をそのまま全面表示） */

@keyframes titleRise {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ── ハトが飛び立つアニメーション ── */
.doves-container {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 1;
}
.dove {
  position: absolute;
  pointer-events: none;
  opacity: 0;
  animation: doveFly ease-in-out infinite;
  user-select: none;
  line-height: 1;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,.35));
}
.dove-1 { bottom:42%; left:20%; font-size:22px; animation-duration:4.8s; animation-delay:0.0s; }
.dove-2 { bottom:35%; left:36%; font-size:30px; animation-duration:4.0s; animation-delay:0.9s; }
.dove-3 { bottom:50%; left:50%; font-size:19px; animation-duration:5.4s; animation-delay:1.8s; }
.dove-4 { bottom:28%; left:63%; font-size:26px; animation-duration:4.3s; animation-delay:2.7s; }
.dove-5 { bottom:46%; left:29%; font-size:17px; animation-duration:5.1s; animation-delay:3.5s; }
.dove-6 { bottom:38%; left:55%; font-size:24px; animation-duration:3.8s; animation-delay:1.4s; }
@keyframes doveFly {
  0%   { opacity:0; transform:translate(0,0) rotate(-12deg) scale(.85); }
  7%   { opacity:1; }
  72%  { opacity:.9; }
  90%  { opacity:0; transform:translate(72px,-165px) rotate(14deg) scale(1.08); }
  100% { opacity:0; transform:translate(0,0) rotate(-12deg) scale(.85); }
}

/* ── テキスト・ボタンエリア（画像の上に重なるガラスカード） ── */
.title-content {
  position: relative;
  z-index: 2;
  width: 92%;
  max-width: 600px;
  padding: 24px 36px 16px;
  text-align: center;
  background: rgba(0, 10, 30, .52);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 16px;
  border: 1px solid rgba(100, 160, 255, .20);
  box-shadow: 0 8px 40px rgba(0, 0, 0, .45);
}

/* タイトルロゴ */
.title-logo {
  font-size: 34px;
  font-weight: 900;
  background: linear-gradient(180deg, #ffffff 0%, #d8f0ff 40%, #90d0ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 22px rgba(80,160,255,.9))
          drop-shadow(0 2px 8px rgba(0,0,0,.7));
  letter-spacing: 7px;
  margin-bottom: 4px;
}
.title-sub-ja {
  font-size: 19px;
  font-weight: 700;
  background: linear-gradient(180deg, #fffbe0 0%, #ffd700 50%, #d4a010 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 16px rgba(255,210,0,.85))
          drop-shadow(0 2px 5px rgba(0,0,0,.6));
  letter-spacing: 10px;
  margin-bottom: 10px;
}
.title-tagline {
  color: #c8e8ff;
  font-size: 12px;
  margin-bottom: 10px;
  letter-spacing: 2px;
  font-style: italic;
  text-shadow: 0 1px 4px rgba(0,0,0,.7);
}
.title-desc {
  color: #dceeff;
  font-size: 13px;
  line-height: 1.75;
  margin-bottom: 12px;
  text-shadow: 0 1px 4px rgba(0,0,0,.65);
}
.title-desc strong { color: #ffe88a; }
.title-desc span   { color: #88d8ff; }

/* タイトル画面 役割バッジ */
.title-role-badge {
  display: inline-block;
  padding: 4px 18px;
  background: rgba(255,215,0,.18);
  border: 1px solid rgba(255,200,0,.55);
  border-radius: 20px;
  color: #ffe080;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 10px;
  letter-spacing: 2px;
  text-shadow: 0 1px 4px rgba(0,0,0,.6);
}

/* サイドバー 役割バッジ */
.sb-role-badge {
  font-size: 11px;
  color: var(--gold);
  background: rgba(255,215,0,.1);
  border: 1px solid rgba(255,215,0,.25);
  border-radius: 10px;
  text-align: center;
  padding: 3px 6px;
  margin-bottom: 6px;
}

/* 社長決断プロンプト */
.decision-prompt {
  color: var(--yellow);
  font-weight: 700;
  font-size: 14px;
  padding: 8px 14px;
  background: rgba(255,204,0,.08);
  border-left: 3px solid var(--yellow);
  border-radius: 0 4px 4px 0;
  margin: 2px 0;
}

/* 社長決断ラベル */
.ceo-decision {
  color: var(--cyan);
  font-weight: 700;
  font-size: 13px;
  padding: 4px 0;
  letter-spacing: .5px;
}

.title-start-btn {
  display: inline-block;
  margin-top: 8px;
  padding: 14px 44px;
  background: linear-gradient(135deg, #0050cc, #0080ff);
  color: #ffffff;
  font-size: 17px;
  font-weight: 800;
  font-family: inherit;
  letter-spacing: 3px;
  border: 1px solid rgba(100,180,255,.5);
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(0,80,200,.6), 0 0 40px rgba(80,160,255,.25);
  animation: pulse 1.6s ease-in-out infinite;
  text-shadow: 0 1px 4px rgba(0,0,0,.4);
}
.title-start-btn:active { transform: scale(.97); }
@keyframes pulse {
  0%,100% { opacity:1;   box-shadow: 0 4px 24px rgba(0,80,200,.6), 0 0 40px rgba(80,160,255,.25); }
  50%      { opacity:.82; box-shadow: 0 2px 10px rgba(0,80,200,.3), 0 0 14px rgba(80,160,255,.12); }
}
/* 続きから再開ボタン */
.title-resume-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 32px;
  background: rgba(10,30,70,.55);
  color: #b8deff;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  letter-spacing: 2px;
  border: 1px solid rgba(80,160,255,.5);
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,.4);
  transition: background .2s, box-shadow .2s;
  backdrop-filter: blur(6px);
  text-shadow: 0 1px 3px rgba(0,0,0,.5);
}
.title-resume-btn:hover  { background: rgba(10,50,110,.7); box-shadow: 0 4px 20px rgba(0,0,0,.5); }
.title-resume-btn:active { transform: scale(.97); }
/* セーブ情報テキスト */
.title-save-info {
  color: #a0c8f0;
  font-size: 12px;
  margin: 14px 0 4px;
  letter-spacing: 1px;
  text-shadow: 0 1px 3px rgba(0,0,0,.6);
}

/* ─── ルール区切り ─── */
.story-rule {
  text-align: center;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 2px;
  position: relative;
  padding: 2px 0;
}
.story-rule::before, .story-rule::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 28%;
  height: 1px;
  opacity: .35;
}
.story-rule::before { left: 0; }
.story-rule::after  { right: 0; }
.story-rule.cyan   { color: var(--cyan);   } .story-rule.cyan::before,   .story-rule.cyan::after   { background: var(--cyan);   }
.story-rule.yellow { color: var(--yellow); } .story-rule.yellow::before, .story-rule.yellow::after { background: var(--yellow); }
.story-rule.red    { color: var(--red);    } .story-rule.red::before,    .story-rule.red::after    { background: var(--red);    }
.story-rule.blue   { color: #4499ff;       } .story-rule.blue::before,   .story-rule.blue::after   { background: #4499ff;       }
.story-rule.white  { color: var(--white);  } .story-rule.white::before,  .story-rule.white::after  { background: var(--white);  }

/* ─── パネル ─── */
.story-panel {
  background: var(--bg-panel);
  border-radius: var(--radius);
  overflow: hidden;
}
.panel-title {
  padding: 6px 14px;
  font-weight: 700;
  font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.panel-body { padding: 10px 14px; line-height: 1.75; }

/* パネルカラーバリアント */
.story-panel.gold       { border: 1px solid var(--gold-dk); }
.story-panel.gold       .panel-title { background: rgba(184,134,11,.15); color: var(--gold); }
.story-panel.yellow     { border: 1px solid #997700; }
.story-panel.yellow     .panel-title { background: rgba(153,119,0,.2);  color: var(--yellow); }
.story-panel.green      { border: 1px solid #006633; }
.story-panel.green      .panel-title { background: rgba(0,102,51,.2);   color: var(--green); }
.story-panel.red        { border: 1px solid #880000; }
.story-panel.red        .panel-title { background: rgba(136,0,0,.2);    color: var(--red); }
.story-panel.cyan       { border: 1px solid #005588; }
.story-panel.cyan       .panel-title { background: rgba(0,85,136,.2);   color: var(--cyan); }
.story-panel.white      { border: 1px solid #333355; }
.story-panel.white      .panel-title { background: rgba(51,51,85,.3);   color: var(--white); }
.story-panel.gold-bright {
  border: 2px solid var(--gold);
  box-shadow: 0 0 28px rgba(255,215,0,.3), inset 0 0 40px rgba(255,215,0,.04);
}
.story-panel.gold-bright .panel-title {
  background: rgba(255,215,0,.18);
  color: var(--gold-br);
  font-size: 17px;
  letter-spacing: 2px;
  text-shadow: 0 0 16px rgba(255,215,0,.6);
}

/* ─── 業種リスト ─── */
.biz-list { display: flex; flex-direction: column; gap: 8px; }
.biz-choice {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 14px;
  background: var(--bg-panel); border-radius: var(--radius);
}
.biz-name  { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
.biz-desc  { font-size: 12px; color: var(--dim); margin-bottom: 4px; }
.biz-stats { font-size: 11px; color: #555580; font-family: monospace; }

/* ─── 選択肢 ─── */
/* 選択肢ラッパー */
.choices-wrapper { margin-top: 6px; }
/* ⏳ タイマークライシス：砂時計（グレー基調＋差し色アンバー） */
.crisis-timer {
  display: flex; align-items: center; gap: 9px;
  margin: 0 2px 9px; padding: 7px 11px;
  background: rgba(40,40,44,.72);
  border: 1px solid rgba(120,120,128,.45);
  border-radius: 7px;
}
.crisis-timer-icon { font-size: 15px; line-height: 1; flex: none; }
.crisis-timer-track {
  flex: 1; height: 7px; border-radius: 4px;
  background: rgba(90,90,96,.45); overflow: hidden;
}
.crisis-timer-fill {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, #b5963f 0%, #d9b863 100%);
  transition: width .25s linear;
}
.crisis-timer-text {
  font-size: 11px; color: var(--dim); letter-spacing: .5px;
  flex: none; min-width: 56px; text-align: right;
  font-variant-numeric: tabular-nums;
}
/* 残り5秒以下：警告点滅 */
.crisis-timer.urgent .crisis-timer-fill { background: #c0504d; }
.crisis-timer.urgent .crisis-timer-text { color: #e08b88; }
.crisis-timer.urgent { animation: crisisPulse .9s ease-in-out infinite; }
@keyframes crisisPulse {
  0%,100% { border-color: rgba(120,120,128,.45); }
  50%     { border-color: rgba(192,80,77,.9); }
}
.choices-header {
  font-size: 11px; color: var(--dim); letter-spacing: .5px;
  margin-bottom: 7px; padding: 0 2px;
  opacity: .75;
}
.choices-container { display: flex; flex-direction: column; gap: 9px; }
.choice-item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 13px 16px;
  background: linear-gradient(135deg, rgba(22,51,90,.95) 0%, rgba(16,40,74,.95) 100%);
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.04);
  transition: transform .18s ease, box-shadow .18s ease, background .15s, outline .1s;
  cursor: pointer;
  position: relative;
  /* ダブルクリックでテキストが選択され、ブラウザの選択メニュー
     （コピー/検索/Copilot等）が出るのを防ぐ */
  user-select: none;
  -webkit-user-select: none;
  overflow: hidden;
  outline: 2px solid transparent;
}
.choice-item::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
}
.choice-item:hover {
  transform: translateX(4px);
  box-shadow: 0 4px 18px rgba(0,150,255,.28), inset 0 1px 0 rgba(255,255,255,.1);
  background: linear-gradient(135deg, rgba(30,70,120,.98) 0%, rgba(22,55,100,.98) 100%);
  outline: 2px solid rgba(0,180,255,.35);
}
/* シングルクリック時に「もう一度クリックで決定」フラッシュ */
.choice-item.single-click {
  outline: 2px solid var(--cyan);
  box-shadow: 0 0 18px rgba(0,229,255,.5);
}
.choice-item:active {
  transform: translateX(2px) scale(.99);
}
.choice-letter {
  flex-shrink: 0;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  font-weight: 900; font-size: 15px;
  box-shadow: 0 0 12px rgba(0,0,0,.3);
}
.choice-a { border-left: 3px solid var(--cyan);   }  .choice-a .choice-letter { background: rgba(0,229,255,.12); color: var(--cyan);   border: 1px solid var(--cyan);   }
.choice-b { border-left: 3px solid var(--yellow); }  .choice-b .choice-letter { background: rgba(255,204,0,.12);  color: var(--yellow); border: 1px solid var(--yellow); }
.choice-c { border-left: 3px solid var(--green);  }  .choice-c .choice-letter { background: rgba(0,221,136,.12);  color: var(--green);  border: 1px solid var(--green);  }
.choice-d { border-left: 3px solid var(--purple); }  .choice-d .choice-letter { background: rgba(204,68,255,.12); color: var(--purple); border: 1px solid var(--purple); }
.choice-text  { flex: 1; }
.choice-title { font-weight: 700; font-size: 13px; margin-bottom: 3px; }
.choice-desc  { font-size: 12px; color: var(--dim); }
.choice-hints { margin-top: 5px; display: flex; gap: 14px; flex-wrap: wrap; }
.choice-hints-hidden { display: none !important; }   /* IPO先生に相談するまで非表示 */
.hint-profit  { font-size: 12px; color: var(--green); }
.hint-risk    { font-size: 12px; color: var(--yellow); }

/* ─── 結果パネル ─── */
.result-panel {
  display: flex; gap: 12px;
  padding: 10px 14px; border-radius: var(--radius);
}
.result-good { background: rgba(0,80,40,.25);  border: 1px solid #005522; }
.result-bad  { background: rgba(80,0,0,.25);   border: 1px solid #550000; }
.result-icon { font-size: 20px; flex-shrink: 0; line-height: 1.4; }
.result-text { white-space: pre-wrap; font-size: 13px; line-height: 1.7; flex: 1; }

/* ─── 爆弾 ─── */
.bomb-panel {
  background: rgba(100,0,0,.3);
  border: 2px solid var(--red);
  border-radius: var(--radius);
  padding: 12px 14px;
  animation: shake .4s ease;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-5px); }
  40%     { transform: translateX(5px); }
  60%     { transform: translateX(-3px); }
  80%     { transform: translateX(3px); }
}
.bomb-title { color: var(--red); font-weight: 700; font-size: 15px; margin-bottom: 8px; }
.bomb-text  { white-space: pre-wrap; font-size: 13px; color: #ffaaaa; line-height: 1.7; }

/* ─── 審査 ─── */
.exam-container    { display: flex; flex-direction: column; gap: 10px; }
.exam-section      { background: var(--bg-panel); border-radius: var(--radius); padding: 10px 14px; }
.exam-section-title { font-weight: 700; font-size: 13px; margin-bottom: 8px; }
.exam-section-title.cyan   { color: var(--cyan); }
.exam-section-title.yellow { color: var(--yellow); }
.exam-item { padding: 3px 0; font-size: 13px; }
.exam-item.pass { color: var(--green); }
.exam-item.fail { color: var(--red); }

/* ─── スコアサマリー ─── */
.score-summary  { background: var(--bg-panel); border: 1px solid var(--gold-dk); border-radius: var(--radius); padding: 14px; }
.score-sum-title { color: var(--gold); font-weight: 700; font-size: 15px; text-align: center; margin-bottom: 12px; }
.score-table    { width: 100%; border-collapse: collapse; }
.score-table th { color: var(--dim); font-size: 12px; text-align: left; padding: 4px 8px; border-bottom: 1px solid #2a5888; }
.score-table td { padding: 5px 8px; font-size: 13px; }

/* ─── 四半期業績ブリーフィング ─── */
.qbr-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 16px;
  margin-bottom: 8px;
}
.qbr-cell  { display: flex; flex-direction: column; gap: 3px; }
.qbr-lbl   { font-size: 11px; color: var(--dim); }
.qbr-val   { font-size: 16px; font-weight: 700; font-family: 'Courier New', monospace; }
.qbr-section { font-size: 12px; font-weight: 700; color: var(--dim);
               border-top: 1px solid rgba(255,255,255,.08); margin: 8px 0 5px; padding-top: 6px; }
.qbr-issue { font-size: 12px; color: var(--yellow); margin: 3px 0; }
.qbr-good  { font-size: 12px; color: var(--green);  margin: 3px 0; }
.qbr-sub   { font-size: 11px; color: var(--dim); margin-top: 2px; }
/* 一時費用セルは赤みがかった背景で強調 */
.qbr-otc   { background: rgba(255,60,40,.08); border-radius: 4px; padding: 4px 6px; }

/* ─── 財務インパクット表示 ─── */
.financial-delta {
  padding: 8px 14px;
  background: rgba(0,40,80,.5);
  border: 1px solid rgba(100,200,255,.25);
  border-left: 3px solid #3388cc;
  border-radius: var(--radius);
  font-size: 12px;
  line-height: 1.9;
}
/* ─── 意思決定受理カード（効果は次Q冒頭に報告） ─── */
.decision-accepted {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px;
  background: rgba(0,100,200,.12);
  border: 1px solid rgba(0,150,255,.25);
  border-radius: 6px;
  margin-top: 6px;
}
.da-icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
.da-title { font-weight: 700; font-size: 13px; margin-bottom: 3px; color: var(--cyan); }
.da-choice { font-size: 12px; color: var(--white); margin-bottom: 4px; }
.da-note { font-size: 11px; color: var(--dim); font-style: italic; }

/* ─── 反映予約ノート（意思決定直後） ─── */
.pending-fin-note {
  padding: 8px 14px;
  background: linear-gradient(90deg, rgba(40,30,10,.5), rgba(30,25,15,.3));
  border: 1px dashed rgba(255,170,85,.35);
  border-radius: var(--radius);
  font-size: 12px;
  line-height: 1.7;
  margin-top: 4px;
}
.pfn-label {
  color: #ffaa55;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 1px;
  margin-right: 6px;
}
.pfn-sub {
  color: #7a8599;
  font-size: 10.5px;
  font-style: italic;
}
/* ─── 📊 四半期決算レポート ─── */
.quarter-closing-report {
  background: linear-gradient(135deg, rgba(10,25,55,.98), rgba(15,35,70,.99));
  border: 2px solid var(--gold-dk);
  border-left: 6px solid var(--gold);
  border-radius: 10px;
  padding: 18px 22px;
  margin: 8px 0;
  box-shadow: 0 0 30px rgba(255,215,0,.15), inset 0 0 40px rgba(0,0,80,.25);
  animation: fadeSlide .4s ease;
}
.qcr-title {
  font-size: 15px;
  font-weight: 900;
  color: var(--gold-br);
  letter-spacing: 3px;
  text-align: center;
  padding-bottom: 10px;
  margin-bottom: 12px;
  border-bottom: 1px solid rgba(255,215,0,.3);
  text-shadow: 0 0 10px rgba(255,215,0,.4);
}
.qcr-body { font-size: 12.5px; }
.qcr-section {
  margin-bottom: 10px;
  padding: 6px 8px;
  background: rgba(0,0,30,.3);
  border-radius: 4px;
}
.qcr-sh {
  color: var(--cyan);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.qcr-sb { color: var(--text); line-height: 1.85; }
.qcr-sb strong { color: var(--gold-br); font-weight: 700; }
.qcr-runway {
  text-align: center;
  font-weight: 700;
  font-size: 13px;
  padding: 8px;
  margin-top: 6px;
  background: rgba(0,0,0,.3);
  border-radius: 4px;
  letter-spacing: 1px;
}
.fdelta-label {
  color: var(--dim);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 1px;
  display: block;
  margin-bottom: 4px;
  border-bottom: 1px solid rgba(255,255,255,.06);
  padding-bottom: 4px;
}

/* ─── CEOモノローグ ─── */
.ceo-monologue {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 10px 14px;
  border-radius: var(--radius);
  border-left: 4px solid;
  font-size: 13px;
  line-height: 1.7;
}
.ceo-monologue.ceo-normal  { background: rgba(0,30,60,.4);   border-color: #334466; }
.ceo-monologue.ceo-warning { background: rgba(80,60,0,.4);   border-color: var(--yellow);
                              animation: glow-yellow 2s ease-in-out infinite; }
.ceo-monologue.ceo-crisis  { background: rgba(100,0,0,.4);   border-color: var(--red);
                              animation: glow-red 1.4s ease-in-out infinite; }
.ceo-monologue.ceo-tension { background: rgba(40,40,0,.4);   border-color: #887700; }
.ceo-monologue.ceo-final   { background: rgba(100,20,0,.5);  border-color: var(--red);
                              border-width: 4px;
                              box-shadow: 0 0 20px rgba(255,60,40,.3);
                              animation: glow-red 1s ease-in-out infinite; }
@keyframes glow-yellow {
  0%,100% { box-shadow: none; }
  50%     { box-shadow: 0 0 12px rgba(255,204,0,.3); }
}
@keyframes glow-red {
  0%,100% { box-shadow: none; }
  50%     { box-shadow: 0 0 16px rgba(255,60,40,.4); }
}
.mono-icon { font-size: 20px; flex-shrink: 0; }
.mono-body { flex: 1; color: var(--white); }
.mono-line { white-space: pre-wrap; display: block; }

/* ─── テキストユーティリティ ─── */
.ok-msg        { color: var(--green);  font-size: 13px; padding: 3px 0; }
.ng-msg        { color: var(--red);    font-size: 13px; padding: 3px 0; }
.err-msg       { color: var(--red);    font-size: 13px; padding: 3px 0; }
.dim-text      { color: var(--dim);    font-size: 12px; }
.hint-text     { color: var(--dim);    font-size: 12px; }
.gold-text     { color: var(--gold); }
.selected-label { color: var(--cyan); font-weight: 700; font-size: 13px; padding: 3px 0; }
.event-question { color: var(--yellow); font-weight: 700; font-size: 14px; padding: 8px 0; }

/* ─── 上場審査 専用ヘッダー ─── */
.tse-exam-header {
  background: linear-gradient(135deg, #200000 0%, #550000 50%, #200000 100%);
  border: 2px solid var(--red);
  border-radius: 10px;
  text-align: center;
  padding: 20px 24px 16px;
  box-shadow: 0 0 40px rgba(255,60,40,.3), inset 0 0 60px rgba(0,0,0,.4);
}
.tse-exam-label {
  color: rgba(255,100,80,.7);
  font-size: 11px;
  letter-spacing: 4px;
  font-weight: 700;
  margin-bottom: 8px;
}
.tse-exam-title {
  color: #ffffff;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: 4px;
  line-height: 1.3;
  text-shadow: 0 0 20px rgba(255,80,60,.6), 0 2px 0 #000;
  margin-bottom: 10px;
}
.tse-exam-market {
  display: inline-block;
  background: rgba(255,60,40,.2);
  border: 1px solid rgba(255,60,40,.5);
  color: var(--red);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 4px 18px;
  border-radius: 20px;
  margin-bottom: 6px;
}
.tse-exam-company {
  color: var(--dim);
  font-size: 12px;
  letter-spacing: 1px;
  margin-top: 4px;
}

/* ════════════════════════════════════════════
   🎰 四半期スロット（インライン・ターン終了時）
════════════════════════════════════════════ */
.quarterly-slot {
  background: linear-gradient(160deg, #0a1a3a 0%, #0d1f45 100%);
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 20px 24px;
  text-align: center;
  box-shadow: 0 0 30px rgba(255,215,0,.15);
}
.qs-title {
  color: var(--gold);
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 2px;
  margin-bottom: 16px;
  text-shadow: 0 0 12px rgba(255,215,0,.4);
}
.qs-reels {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 14px;
  margin-bottom: 10px;
}
.qs-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.qs-reel {
  width: 68px; height: 68px;
  background: rgba(0,0,0,.55);
  border: 2px solid rgba(255,215,0,.3);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px;
  transition: border-color .3s, box-shadow .3s;
}
.qs-reel.stopped {
  border-color: var(--gold);
  box-shadow: 0 0 14px rgba(255,215,0,.35);
}
.qs-rlbl { font-size: 11px; color: var(--dim); letter-spacing: 1px; }
.qs-sep  { color: var(--gold-dk); font-size: 20px; font-weight: 700; margin-top: 24px; }
.qs-extra { margin-top: 12px; display: none; animation: fadeSlide .35s ease; }
.qs-labels {
  display: flex;
  justify-content: center;
  gap: 0;
  margin-bottom: 8px;
}
.qs-lbl-item {
  width: 96px;
  font-size: 13px;
  font-weight: 700;
  color: var(--white);
  text-align: center;
}
.qs-verdict {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 8px 18px;
  border-radius: 6px;
  display: inline-block;
  margin-top: 4px;
}
.qs-verdict-good { color: var(--green);  background: rgba(0,80,40,.35);  border: 1px solid #005522; }
.qs-verdict-bad  { color: var(--red);    background: rgba(80,0,0,.35);   border: 1px solid #550000;
                   animation: glow-red 1.2s ease-in-out infinite; }
.qs-verdict-mid  { color: var(--yellow); background: rgba(80,60,0,.35);  border: 1px solid #554400; }

/* 突発イベントリール停止時の強調 */
.qs-reel.fortune-bad  { border-color: var(--red) !important;    box-shadow: 0 0 20px rgba(255,60,40,.6) !important; }
.qs-reel.fortune-good { border-color: var(--green) !important;  box-shadow: 0 0 20px rgba(0,221,136,.6) !important; }
.qs-reel.fortune-mid  { border-color: var(--yellow) !important; box-shadow: 0 0 20px rgba(255,204,0,.5) !important; }

/* ════════════════════════════════════════════
   🎰 スロットマシーン（決断ルーレット）オーバーレイ ※旧・非使用
════════════════════════════════════════════ */
#slot-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,30,.88);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: slotFadeIn .15s ease;
}
#slot-overlay.slot-fade-out {
  animation: slotFadeOut .35s ease forwards;
}
@keyframes slotFadeIn  { from { opacity:0; } to { opacity:1; } }
@keyframes slotFadeOut { from { opacity:1; } to { opacity:0; } }

.slot-box {
  background: linear-gradient(160deg, #0a2a5a 0%, #0f1e40 100%);
  border: 2px solid var(--gold);
  border-radius: 16px;
  padding: 32px 40px;
  text-align: center;
  box-shadow: 0 0 60px rgba(255,215,0,.25), 0 0 120px rgba(0,150,255,.15);
  min-width: 340px;
}
.slot-title {
  color: var(--gold);
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 3px;
  margin-bottom: 28px;
  text-shadow: 0 0 20px rgba(255,215,0,.6);
}
.slot-reels {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}
.slot-reel {
  width: 72px; height: 72px;
  background: rgba(0,0,0,.5);
  border: 2px solid rgba(255,215,0,.4);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  box-shadow: inset 0 0 20px rgba(0,0,0,.5);
  transition: none;
}
.slot-sep { color: var(--gold-dk); font-size: 20px; font-weight: 700; }
.slot-sub {
  color: var(--dim);
  font-size: 12px;
  letter-spacing: 1px;
  margin-top: 8px;
}
.slot-result-line {
  margin-top: 14px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  opacity: 0;
  transition: opacity .3s ease;
}
.slot-result-line.show { opacity: 1; }
.slot-result-line.good { color: var(--green); }
.slot-result-line.bad  { color: var(--red); }

/* ════════════════════════════════════════════
   ② IPO先生 固定表示（サイドバー下部 sticky）
════════════════════════════════════════════ */
.advisor-sticky {
  position: sticky;
  bottom: 0;
  background: var(--bg-sb);
  border-top: 1px solid #2a5888;
  padding: 5px 0 3px;
  margin-top: 8px;
}
.advisor-sticky .sb-sec {
  border-top: none;
  margin-top: 0;
}

/* ════════════════════════════════════════════
   ③ 選択フェーズ：入力欄を非表示にする
════════════════════════════════════════════ */
#app.selection-mode {
  grid-template-rows: 48px 1fr auto;
}
#app.selection-mode #input-area {
  display: none;
}

/* ════════════════════════════════════════════
   ボタンバー（スマホ・タッチ対応）
════════════════════════════════════════════ */
#btn-bar {
  background: var(--bg-sb);
  border-top: 1px solid #2a5888;
  padding: 8px 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  min-height: 0;
}
#btn-bar:empty { display: none; padding: 0; border: none; }

.btn-action {
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  font-weight: 700;
  letter-spacing: .4px;
  transition: opacity .15s, transform .1s, box-shadow .2s, filter .2s;
  flex-shrink: 0;
}
.btn-action:hover  { filter: brightness(1.12); transform: translateY(-1px); }
.btn-action:active { transform: scale(.95); opacity: .85; }

.btn-primary  {
  background: linear-gradient(135deg, #4ff3ff 0%, var(--cyan) 60%, #00a8c7 100%);
  color: #001420; border-color: var(--cyan);
  box-shadow: 0 0 16px rgba(0,229,255,.45), inset 0 1px 0 rgba(255,255,255,.3);
}
.btn-continue {
  background: linear-gradient(135deg, #ffe866 0%, var(--gold) 60%, #b8860b 100%);
  color: #1a0f00; border-color: var(--gold);
  box-shadow: 0 0 16px rgba(255,215,0,.45), inset 0 1px 0 rgba(255,255,255,.3);
}
.btn-a { background: rgba(0,229,255,.15); color: var(--cyan);   border-color: var(--cyan);   }
.btn-b { background: rgba(255,204,0,.15); color: var(--yellow); border-color: var(--yellow); }
.btn-c { background: rgba(0,221,136,.15); color: var(--green);  border-color: var(--green);  }
.btn-d { background: rgba(204,68,255,.15);color: var(--purple); border-color: var(--purple); }
.btn-advisor {
  background: rgba(255,215,0,.07);
  color: var(--gold);
  border-color: rgba(255,215,0,.35);
  font-size: 12px;
  padding: 7px 14px;
}
.btn-advisor:hover { background: rgba(255,215,0,.15); }

/* 💾 セーブボタン */
.btn-save {
  background: rgba(0,100,60,.15);
  color: #44dd99;
  border-color: rgba(0,200,120,.35);
  font-size: 12px;
  padding: 7px 14px;
  margin-left: auto;   /* 右端に寄せる */
}
.btn-save:hover { background: rgba(0,180,100,.2); }

/* セーブ完了トースト */
.save-toast {
  background: linear-gradient(135deg, rgba(0,60,30,.95) 0%, rgba(0,40,20,.97) 100%);
  border: 1px solid #00cc66;
  border-left: 4px solid #00dd88;
  border-radius: 6px;
  padding: 10px 16px;
  color: #88ffcc;
  font-size: 13px;
  animation: fadeSlide .2s ease;
}
.save-toast-fail {
  border-color: var(--red);
  border-left-color: var(--red);
  color: #ffaaaa;
  background: rgba(60,0,0,.9);
}

/* ════════════════════════════════════════════
   💡 IPO先生アドバイザーパネル
════════════════════════════════════════════ */
.advisor-chat {
  background: linear-gradient(135deg, rgba(8,25,55,.9) 0%, rgba(12,22,48,.95) 100%);
  border: 1px solid var(--gold-dk);
  border-left: 4px solid var(--gold);
  border-radius: 8px;
  padding: 14px 16px;
  animation: fadeSlide .2s ease;
}
.adv-header {
  color: var(--gold);
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 10px;
  padding-bottom: 7px;
  border-bottom: 1px solid rgba(255,215,0,.2);
}
.adv-context {
  color: var(--white);
  font-size: 12px;
  line-height: 1.75;
  margin-bottom: 8px;
  padding: 8px 10px;
  background: rgba(255,215,0,.05);
  border-radius: 4px;
}
.adv-ipo-tip {
  font-size: 12px;
  color: var(--cyan);
  padding: 6px 10px;
  background: rgba(0,229,255,.06);
  border-radius: 4px;
  margin-bottom: 8px;
}
.adv-warning {
  font-size: 12px;
  color: var(--red);
  font-weight: 700;
  padding: 6px 10px;
  background: rgba(255,60,40,.1);
  border-radius: 4px;
  margin-bottom: 8px;
}
.adv-opts-title {
  color: var(--dim);
  font-size: 11px;
  margin: 8px 0 6px;
  letter-spacing: 1px;
}
.adv-opts { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.adv-opt {
  display: flex;
  gap: 9px;
  align-items: flex-start;
  padding: 6px 8px;
  background: rgba(255,255,255,.03);
  border-radius: 4px;
}
.adv-ltr {
  flex-shrink: 0;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px;
  font-weight: 900; font-size: 12px;
}
.adv-ltr-a { background: rgba(0,229,255,.12); color: var(--cyan);   border: 1px solid var(--cyan);   }
.adv-ltr-b { background: rgba(255,204,0,.12);  color: var(--yellow); border: 1px solid var(--yellow); }
.adv-ltr-c { background: rgba(0,221,136,.12);  color: var(--green);  border: 1px solid var(--green);  }
.adv-ltr-d { background: rgba(204,68,255,.12); color: var(--purple); border: 1px solid var(--purple); }
.adv-opt-body { flex: 1; }
.adv-opt-desc { font-size: 12px; color: var(--text); line-height: 1.5; }
.adv-footer {
  text-align: center;
  color: var(--dim);
  font-size: 11px;
  padding-top: 7px;
  border-top: 1px solid rgba(255,255,255,.06);
}

/* サイドバー状態モニター（コンパクト版） */
.sb-mood { font-size: 12px; margin-top: 8px; padding: 4px 0; }

/* ════════════════════════════════════════════
   インプットエリア
════════════════════════════════════════════ */
#input-area {
  background: var(--bg-sb);
  border-top: 2px solid #3399dd;
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 10px;
}
#prompt-icon {
  color: var(--gold);
  font-size: 20px;
  font-weight: 700;
  flex-shrink: 0;
  text-shadow: 0 0 10px rgba(255,215,0,.5);
}
#game-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--gold);
  font-size: 15px;
  font-family: inherit;
  caret-color: var(--gold);
  letter-spacing: 1px;
}
#game-input::placeholder { color: #4a7799; }
#input-key-hint { color: #4a7799; font-size: 11px; flex-shrink: 0; }
/* ════════════════════════════════════════════
   🤖 AIナラティブパネル（ターン開始）
════════════════════════════════════════════ */
.ai-narrative {
  background: linear-gradient(135deg, rgba(0,8,30,.98) 0%, rgba(5,18,50,.99) 100%);
  border: 1px solid rgba(0,229,255,.25);
  border-left: 5px solid var(--cyan);
  border-radius: 8px;
  padding: 18px 22px;
  animation: fadeSlide .4s ease;
  box-shadow: 0 0 24px rgba(0,229,255,.08), inset 0 0 40px rgba(0,0,80,.3);
}
.ain-header {
  font-size: 10px;
  color: var(--cyan);
  letter-spacing: 4px;
  font-weight: 700;
  margin-bottom: 10px;
  text-transform: uppercase;
  opacity: .8;
}
.ain-body {
  font-style: italic;
  color: #cce8ff;
  font-size: 14px;
  line-height: 2.1;
}
/* ════════════════════════════════════════════
   📖 AI 選択後ドラマパネル
════════════════════════════════════════════ */
.ai-drama {
  background: linear-gradient(135deg, rgba(10,5,30,.97) 0%, rgba(20,8,40,.99) 100%);
  border: 1px solid rgba(180,100,255,.2);
  border-left: 5px solid #cc44ff;
  border-radius: 8px;
  padding: 16px 20px;
  margin-top: 6px;
  animation: fadeSlide .4s ease;
  box-shadow: 0 0 20px rgba(150,50,255,.08);
}
.aid-header {
  font-size: 10px;
  color: #cc44ff;
  letter-spacing: 3px;
  font-weight: 700;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.aid-body {
  font-style: italic;
  font-size: 13.5px;
  line-height: 2.0;
}

/* ════════════════════════════════════════════
   ① タイトル画面 Canvas アニメーション（旧sunrise-canvas削除済み）
════════════════════════════════════════════ */
.title-canvas-content {
  position: relative;
  z-index: 1;
}

/* ════════════════════════════════════════════
   ② BGM サウンドボタン（右下固定）
════════════════════════════════════════════ */
#sound-btn {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: 9999;
  background: rgba(0,30,60,.85);
  border: 1px solid rgba(0,229,255,.4);
  border-radius: 20px;
  color: #00e5ff;
  font-size: 11px;
  font-weight: 700;
  padding: 6px 14px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background .15s, border-color .15s;
  display: none;
}
#sound-btn:hover { background: rgba(0,60,100,.9); border-color: rgba(0,229,255,.8); }
#sound-btn.muted { color: #7aaccc; border-color: rgba(122,172,204,.4); }

/* ─── 監査契約ルーレットアニメーション ─── */
.roulette-wrap {
  text-align: center;
  padding: 20px 16px 16px;
  background: linear-gradient(160deg, rgba(0,20,50,.7) 0%, rgba(10,40,80,.8) 100%);
  border: 1px solid rgba(255,215,0,.35);
  border-radius: 10px;
  margin: 8px 0;
}
/* ── ルーレットヘッダー・凡例 ── */
.roulette-header {
  font-size: 12px; color: var(--gold); letter-spacing: 2px; margin-bottom: 6px;
}
.roulette-legend {
  font-size: 12px; margin-bottom: 10px; display: flex; justify-content: center; gap: 8px;
}
.rl-green { color: var(--green); font-weight: 700; }
.rl-red   { color: var(--red);   font-weight: 700; }
.rl-sep   { color: var(--dim); }
/* ── 回転ディスク ── */
.roulette-disk-wrap {
  position: relative;
  width: 130px;
  height: 130px;
  margin: 0 auto 14px;
}
.roulette-disk {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 3px solid rgba(255,215,0,.7);
  box-shadow: 0 0 30px rgba(255,215,0,.4), inset 0 0 12px rgba(0,0,0,.4);
}
/* ── 固定ポインター（上部中央） ── */
.roulette-pointer {
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left:  10px solid transparent;
  border-right: 10px solid transparent;
  border-top:   20px solid #ffffff;
  filter: drop-shadow(0 0 6px rgba(255,255,255,.9));
  z-index: 2;
}
/* ── 中心ドット ── */
.roulette-center {
  position: absolute;
  top: 50%; left: 50%;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff 40%, #aaa 100%);
  transform: translate(-50%, -50%);
  box-shadow: 0 0 10px rgba(255,255,255,.8);
  z-index: 2;
}
/* ── 「回転中」ラベル ── */
.roulette-spin-label {
  color: var(--cyan);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.roulette-dots {
  display: inline-block;
  animation: rouletteDots 1s steps(3, end) infinite;
}
@keyframes rouletteDots {
  0%  { content: '.';   }
  33% { content: '..';  }
  66% { content: '...'; }
}
/* ── 結果パネル（回転後にフェードイン） ── */
.roulette-result {
  opacity: 0; transform: translateY(8px);
  border-radius: 7px;
  padding: 12px 14px;
  text-align: left;
}
.roulette-result.green {
  background: rgba(0,200,100,.1);
  border: 1px solid var(--green);
}
.roulette-result.red {
  background: rgba(255,80,80,.1);
  border: 1px solid var(--red);
}
.roulette-result-title {
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.roulette-result.green .roulette-result-title { color: var(--green); }
.roulette-result.red   .roulette-result-title { color: var(--red);   }
.roulette-result-body {
  font-size: 13px;
  line-height: 1.75;
  color: var(--white);
}

/* ════════════════════════════════════════════
   スマホ・タブレット対応（768px以下）
════════════════════════════════════════════ */
@media (max-width: 768px) {
  /* ヘッダー：ロゴ非表示・パディング最小化 */
  #hdr {
    padding: 0 52px 0 8px;
  }
  #hdr-logo-link { display: none; }
  #hdr-title { font-size: 13px; letter-spacing: 1px; }
